<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form id="registro">
        <input type="text" id="reg-name" placeholder="name" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password" required>
        <button type="submit">Registrar</button>
    </form>

    <form id="login">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Iniciar Sesión</button>
    </form>

    <p id="mensaje"></p>

    <button type="submit" id="new-chat">new chat</button>

    <form id="mensage-form">
        <input type="text" id="mensage">
        <button type="submit" id="send-mensage">enviar</button>
    </form>

    <script>
        document.getElementById('registro').addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const respuesta = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await respuesta.json();

                document.getElementById('mensaje').innerText = data.message;
                document.getElementById('mensaje').style.color = "green";

            } catch (error) {
                document.getElementById('mensaje').innerText = "Error en la conexión";
                document.getElementById('mensaje').style.color = "red";
            }
        });

        document.getElementById('login').addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;


            try {
                const respuesta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });


                const data = await respuesta.json();

                document.getElementById('mensaje').innerText = data.message;
                document.getElementById('mensaje').style.color = "green";

            } catch (error) {
                document.getElementById('mensaje').innerText = "Error en la conexión";
                document.getElementById('mensaje').style.color = "red";
            }
        });

        document.getElementById('new-chat').addEventListener('click', async (event) => {
            event.preventDefault();

            try {
                const respuesta = await fetch('/api/new-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });


                const data = await respuesta.json();

                document.getElementById('mensaje').innerText = data.message;
                document.getElementById('mensaje').style.color = "green";

            } catch (error) {
                document.getElementById('mensaje').innerText = "Error en la conexión";
                document.getElementById('mensaje').style.color = "red";
            }

        });

        document.getElementById('mensage-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const content = document.getElementById('mensage').value;

            try {
                const respuesta = await fetch('/api/mensage-manager', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "role": 'user', content })

                const data = await respuesta.json();

                document.getElementById('mensaje').innerText = data.message;

            } catch (error) {
                document.getElementById('mensaje').innerText = "Error en la conexión";

            }
        });
    </script>
</body>
